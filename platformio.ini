; PlatformIO Project Configuration File
;
; Brookstone Rover ESP32 conversion — tank-drive robot controlled by a BLE gamepad.
;
;   Board ........ ESP32 DevKit V1 (38-pin, ESP-WROOM-32)  -> esp32doit-devkit-v1
;   Framework .... Arduino
;   Gamepad ...... Bluepad32 (PS4 / PS5 / Xbox / generic BLE controllers)
;
; IMPORTANT: Bluepad32 needs a Bluetooth-Classic (BR/EDR) capable Arduino core.
; The stock "framework-arduinoespressif32" that ships with the espressif32
; platform CANNOT pair with PS4/PS5/Xbox controllers. We therefore override the
; Arduino core with the precompiled Bluepad32-enabled build via platform_packages.
; This lets us keep a normal Arduino sketch (src/main.cpp) using #include <Bluepad32.h>.
;
; Docs: https://bluepad32.readthedocs.io/en/latest/plat_arduino/

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200

; Replace the stock Arduino core with the Bluepad32-enabled core.
; This single package bundles the Arduino core + BTstack + the Bluepad32 library,
; so no extra lib_deps entry is required for Bluepad32.
platform_packages =
    framework-arduinoespressif32 @ https://github.com/ricardoquesada/esp32-arduino-lib-builder/releases/download/4.1.0/esp32-bluepad32-4.1.0.zip
